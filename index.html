<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Money Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen p-5">

  <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-5">

    <h1 class="text-3xl font-bold mb-5">
      💸 Money Tracker
    </h1>

    <!-- Budget Setup -->

    <div class="space-y-3">

      <input
        id="foodBudget"
        type="number"
        placeholder="Budget makan"
        class="w-full border p-3 rounded-2xl"
      >

      <input
        id="snackBudget"
        type="number"
        placeholder="Budget jajan"
        class="w-full border p-3 rounded-2xl"
      >

      <input
        id="rentBudget"
        type="number"
        placeholder="Kontrakan"
        class="w-full border p-3 rounded-2xl"
      >

      <input
        id="otherBudget"
        type="number"
        placeholder="Lain-lain"
        class="w-full border p-3 rounded-2xl"
      >

      <button
        onclick="saveBudget()"
        class="w-full bg-black text-white p-3 rounded-2xl"
      >
        Simpan Budget
      </button>

    <button
        onclick="deleteAllData()"
        class="w-full bg-red-600 text-white p-3 rounded-2xl mt-2"
        >
        Hapus Semua Data
    </button>

    </div>

    <!-- Summary -->

    <div class="mt-6 space-y-3">

      <div
        id="foodSummary"
        class="bg-gray-100 p-4 rounded-2xl"
      ></div>

      <div
        id="snackSummary"
        class="bg-gray-100 p-4 rounded-2xl"
      ></div>

      <div
        id="otherSummary"
        class="bg-gray-100 p-4 rounded-2xl"
      ></div>

    </div>

    <!-- Expense -->

    <div class="mt-6 space-y-3">

      <select
        id="expenseCategory"
        class="w-full border p-3 rounded-2xl"
      >
        <option>Makan</option>
        <option>Jajan</option>
        <option>Lain-lain</option>
      </select>

      <input
        id="expenseAmount"
        type="number"
        placeholder="Nominal"
        class="w-full border p-3 rounded-2xl"
      >

      <input
        id="expenseNote"
        type="text"
        placeholder="Keterangan"
        class="w-full border p-3 rounded-2xl"
      >

      <button
        onclick="addExpense()"
        class="w-full bg-green-600 text-white p-3 rounded-2xl"
      >
        Tambah Pengeluaran
      </button>

    </div>

    <!-- History -->

    <div class="mt-6">

      <h2 class="font-bold text-lg mb-3">
        Riwayat
      </h2>

      <div
        id="history"
        class="space-y-3"
      ></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
