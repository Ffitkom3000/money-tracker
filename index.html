<!DOCTYPE html>
<html lang="id">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Money Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body class="bg-gray-100 min-h-screen">

  <div class="max-w-md mx-auto p-5">

    <!-- HERO -->

    <div class="bg-black text-white rounded-3xl p-6 shadow-xl">

      <div class="text-sm opacity-70">
        Batas Hari Ini
      </div>

      <div
        id="heroLimit"
        class="text-5xl font-bold mt-2"
      >
        Rp 0
      </div>

      <div
        id="heroStatus"
        class="mt-4 inline-block px-4 py-2 rounded-full bg-green-500 text-sm font-bold"
      >
        🟢 AMAN
      </div>

      <div class="mt-6 grid grid-cols-2 gap-4">

        <div>

          <div class="text-sm opacity-70">
            Sisa Uang
          </div>

          <div
            id="heroRemaining"
            class="text-xl font-bold mt-1"
          >
            Rp 0
          </div>

        </div>

        <div>

          <div class="text-sm opacity-70">
            Sisa Hari
          </div>

          <div
            id="heroDays"
            class="text-xl font-bold mt-1"
          >
            0 Hari
          </div>

        </div>

      </div>

    </div>

    <!-- QUICK ADD -->

    <div class="mt-5">

      <div class="text-sm font-bold text-gray-500 mb-3">
        QUICK ADD
      </div>

      <div class="grid grid-cols-4 gap-2">

        <button
          onclick="quickAdd(10000)"
          class="bg-white rounded-2xl p-3 shadow"
        >
          10rb
        </button>

        <button
          onclick="quickAdd(15000)"
          class="bg-white rounded-2xl p-3 shadow"
        >
          15rb
        </button>

        <button
          onclick="quickAdd(20000)"
          class="bg-white rounded-2xl p-3 shadow"
        >
          20rb
        </button>

        <button
          onclick="quickAdd(25000)"
          class="bg-white rounded-2xl p-3 shadow"
        >
          25rb
        </button>

      </div>

    </div>

    <!-- SUMMARY -->

    <div class="mt-6 bg-white rounded-3xl p-5 shadow">

      <div class="flex justify-between py-2">

        <div class="text-gray-500">
          🍜 Makan
        </div>

        <div
          id="foodSummary"
          class="font-bold"
        >
          Rp 0
        </div>

      </div>

      <div class="flex justify-between py-2">

        <div class="text-gray-500">
          🍟 Jajan
        </div>

        <div
          id="snackSummary"
          class="font-bold"
        >
          Rp 0
        </div>

      </div>

      <div class="flex justify-between py-2">

        <div class="text-gray-500">
          📦 Lain-lain
        </div>

        <div
          id="otherSummary"
          class="font-bold"
        >
          Rp 0
        </div>

      </div>

    </div>

    <!-- HISTORY -->

    <div class="mt-6">

      <div class="flex justify-between items-center mb-3">

        <div class="text-sm font-bold text-gray-500">
          RIWAYAT
        </div>

        <button
          onclick="deleteAllData()"
          class="text-red-500 text-sm"
        >
          Hapus Semua
        </button>

      </div>

      <div
        id="history"
        class="space-y-2"
      ></div>

    </div>

  </div>

  <!-- FLOATING BUTTON -->

  <button
    onclick="openModal()"
    class="fixed bottom-6 right-6 w-16 h-16 rounded-full bg-black text-white text-4xl shadow-2xl"
  >
    +
  </button>

  <!-- MODAL -->

  <div
    id="modal"
    class="hidden fixed inset-0 bg-black/40 flex items-end"
  >

    <div class="bg-white w-full rounded-t-3xl p-5">

      <div class="text-xl font-bold mb-5">
        Tambah Pengeluaran
      </div>

      <select
        id="expenseCategory"
        class="w-full border rounded-2xl p-4 mb-3"
      >
        <option>Makan</option>
        <option>Jajan</option>
        <option>Lain-lain</option>
      </select>

      <input
        id="expenseAmount"
        type="number"
        placeholder="Nominal"
        class="w-full border rounded-2xl p-4 mb-3"
      />

      <input
        id="expenseNote"
        type="text"
        placeholder="Keterangan"
        class="w-full border rounded-2xl p-4 mb-3"
      />

      <div class="flex gap-3">

        <button
          onclick="closeModal()"
          class="flex-1 bg-gray-200 rounded-2xl p-4"
        >
          Batal
        </button>

        <button
          onclick="addExpense()"
          class="flex-1 bg-black text-white rounded-2xl p-4"
        >
          Simpan
        </button>

      </div>

      <!-- BUDGET -->

      <details class="mt-6">

        <summary class="cursor-pointer text-gray-500">
          ⚙ Pengaturan Budget
        </summary>

        <div class="mt-4 space-y-3">

          <input
            id="foodBudget"
            type="number"
            placeholder="Budget makan"
            class="w-full border rounded-2xl p-4"
          />

          <input
            id="snackBudget"
            type="number"
            placeholder="Budget jajan"
            class="w-full border rounded-2xl p-4"
          />

          <input
            id="otherBudget"
            type="number"
            placeholder="Lain-lain"
            class="w-full border rounded-2xl p-4"
          />

          <button
            onclick="saveBudget()"
            class="w-full bg-green-600 text-white rounded-2xl p-4"
          >
            Simpan Budget
          </button>

        </div>

      </details>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
